<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Raphael Lopes Alves</title>
</head>

<body>
    <header align="center">
        <h1>Fale comigo</h1>
        <p>Preencha o formulario para entrar em contato.</p>
    </header>

    <hr>

    <main>
        <form action="sucesso.html">

            <!-- FORMULARIO DE CONTATO-->
            <section>
                
                <h2>Formulario de contato</h2>
                
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required>
                <br><br>
    
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
                <br><br>
    
                <label for="assunto">Assunto:</label><br>
                <input type="text" id="assunto" name="assunto" required>
                <br><br>
                
                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="5" cols="30"></textarea>
    
            </section>

            <!-- CAMPOS ADICIONAIS-->
            <section>
                <label for="telefone">Telefone:</label><br>
                <input type="tel" id="telefone" name="telefone">
                <br><br>
    
                <label for="data">Data de contato:</label><br>
                <input type="date" id="data" name="data">
                <br><br>
    
                <label for="select">Tipo de servico:</label><br>
                <select id="select" name="select">
                    <option value="">Selecione</option>
                    <option value="option 1">Producao de video</option>
                    <option value="option 2">Edicao de video</option>
                    <option value="option 3">Marketing digital</option>
                </select>
            </section>

            <br>

            <!--FORMA DE CONTATO PREFERIDA-->
            <section>
                <label> Forma de contato preferida:</label><br>
    
                <input type="radio" name="contato" value="email"> Email<br>
                <input type="radio" name="contato" value="telefone"> Telefone
            </section>

            <br>

            <!--BOTOES DE OPCAO-->
            <section>
                <label>Interesses:</label><br>
    
                <input type="checkbox" name="interesse"> Orcamento<br>
                <input type="checkbox" name="interesse"> Parceiria<br>
                <input type="checkbox" name="interesse"> Outros<br><br>
            </section>
            
            <!-- BOTOES DE LIMPAR E ENVIAR -->
            <section>
                <button type="reset">limpar</button>
                <button type="submit">Enviar</button>
            </section>
        </form>
        <br>
        <a href="index.html">Voltar para a pagina inicial</a>

    </main>
</body>
</html>
